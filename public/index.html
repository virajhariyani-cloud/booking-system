<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBook - Book Bus Tickets Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .bus-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        input, select { 
            color: #333 !important; 
            background: white !important;
            font-size: 16px !important;
        }
        input::placeholder {
            color: #999 !important;
            font-weight: normal !important;
        }
        input:focus {
            outline: none;
            right: 2px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='/'">
                    <i class="fas fa-bus text-3xl text-blue-600"></i>
                    <span class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">BusBook</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                    <a href="/my-bookings.html" class="text-gray-700 hover:text-blue-600 transition">My Bookings</a>
                    <a href="/live-tracking.html" class="text-gray-700 hover:text-blue-600 transition">Live Tracking</a>
                </div>
                <div id="authNav"></div>
            </div>
        </div>
    </nav>
    <section class="bg-gradient-to-r from-blue-900 to-purple-900 text-white py-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <h1 class="text-5xl md:text-6xl font-bold mb-4">Book Your Bus Ticket <span class="text-yellow-400">Instantly</span></h1>
                <p class="text-xl">Safe, Secure & Smart Bus Travel with Real-time Tracking</p>
            </div>  
            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Search Buses</h2>
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">From</label>
                        <input type="text" id="searchFrom" placeholder="Enter departure city" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 text-gray-900"
                               style="color: #333; background: white;">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">To</label>
                        <input type="text" id="searchTo" placeholder="Enter arrival city" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 text-gray-900"
                               style="color: #333; background: white;">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Date</label>
                        <input type="date" id="searchDate" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 text-gray-900"
                               style="color: #333; background: white;">
                    </div>
                </div>
                <button onclick="searchBuses()" class="btn-primary w-full mt-6 text-white font-semibold py-3 rounded-xl hover:opacity-90 transition">
                    <i class="fas fa-search mr-2"></i> Search Buses
                </button>
            </div>
        </div>
    </section>
    <section class="py-16">
        <div class="max-w-7xl mx-auto px-4">
            <h2 class="text-3xl font-bold text-center mb-12">Available Buses</h2>
            <div id="busContainer" class="grid md:grid-cols-3 gap-8">
                <div class="text-center py-12 col-span-3">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
                    <p class="mt-4 text-gray-600">Loading buses...</p>
                </div>
            </div>
        </div>
    </section>
    <footer class="bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2024 BusBook. All rights reserved.</p>
        </div>
    </footer>
    <script>
        let allBuses = [];
        let authToken = localStorage.getItem('token');
        let currentUser = null;
        // Set today's date
        document.getElementById('searchDate').value = new Date().toISOString().split('T')[0];
        // Update navbar
        function updateNavbar() {
            const authNav = document.getElementById('authNav');
            if (authToken && currentUser) {
                authNav.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-700"><i class="fas fa-user-circle"></i> ${currentUser.name}</span>
                        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                `;
            } else {
                authNav.innerHTML = `
                    <button onclick="window.location.href='/login.html'" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                `;
            }
        }
       
        async function loadBuses() {
            try {
                const response = await fetch('/api/buses');
                if (!response.ok) throw new Error('Failed to fetch buses');
                allBuses = await response.json();
                console.log('Loaded buses:', allBuses.length);
                displayBuses(allBuses);
            } catch(error) {
                console.error('Error loading buses:', error);
                document.getElementById('busContainer').innerHTML = `
                    <div class="text-center py-12 col-span-3">
                        <i class="fas fa-exclamation-circle text-4xl text-red-600"></i>
                        <p class="mt-4 text-gray-600">Failed to load buses. Please make sure you've added sample buses.</p>
                        <button onclick="loadBuses()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg">Retry</button>
                    </div>
                `;
            }
        }
        
        function displayBuses(buses) {
            const container = document.getElementById('busContainer');   
            if (!buses || buses.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 col-span-3">
                        <i class="fas fa-bus text-4xl text-gray-400"></i>
                        <h3 class="text-2xl font-bold text-gray-600 mt-4">No Buses Found</h3>
                        <p class="text-gray-500 mt-2">Try searching with different cities</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = buses.map(bus => `
                <div class="bus-card bg-white rounded-2xl shadow-lg overflow-hidden">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-bold text-blue-600">${bus.name}</h3>
                                <p class="text-gray-500 text-sm">Bus No: ${bus.busNumber || 'BUS001'}</p>
                            </div>
                            <i class="fas fa-bus text-3xl text-gray-400"></i>
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <div class="text-center">
                                <p class="font-bold text-lg text-gray-800">${bus.from}</p>
                                <p class="text-xs text-gray-500">Departure: ${bus.departureTime || '10:00 AM'}</p>
                            </div>
                            <i class="fas fa-arrow-right text-gray-400"></i>
                            <div class="text-center">
                                <p class="font-bold text-lg text-gray-800">${bus.to}</p>
                                <p class="text-xs text-gray-500">Arrival: ${bus.arrivalTime || '06:00 PM'}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <p class="text-3xl font-bold text-green-600">₹${bus.price}</p>
                                <p class="text-xs text-gray-500">per seat</p>
                            </div>
                            <div class="text-right">
                                <p class="font-semibold text-gray-800">${bus.totalSeats} seats left</p>
                                <p class="text-xs text-green-600">Available</p>
                            </div>
                        </div>
                        <button onclick="bookBus('${bus._id}')" class="w-full btn-primary text-white font-semibold py-3 rounded-xl hover:opacity-90 transition">
                            <i class="fas fa-ticket-alt mr-2"></i> Book Now
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function searchBuses() {
            const from = document.getElementById('searchFrom').value.toLowerCase();
            const to = document.getElementById('searchTo').value.toLowerCase();   
            let filtered = allBuses;
            if (from) filtered = filtered.filter(bus => bus.from.toLowerCase().includes(from));
            if (to) filtered = filtered.filter(bus => bus.to.toLowerCase().includes(to));
            displayBuses(filtered);
        }
      
        function bookBus(busId) {
            if (!authToken) {
                alert('Please login to book tickets');
                window.location.href = '/login.html';
                return;
            }
            window.location.href = `/seat-selection.html?busId=${busId}`;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }
        authToken = localStorage.getItem('token');
        if (authToken) {
            currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        }
        updateNavbar();
        loadBuses();
        document.getElementById('searchFrom').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBuses();
        });
        document.getElementById('searchTo').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBuses();
        });
    </script>
</body>
</html>
