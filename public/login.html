<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BusBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * {
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-image: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=1600');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.5) 100%);
            z-index: 0;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }
        
        .btn-register {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transition: all 0.3s ease;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(240, 147, 251, 0.4);
        }
        
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
        }
        
        .floating-bus {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="relative z-10 w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center space-x-3 bg-white/20 backdrop-blur-lg rounded-full px-8 py-4 floating-bus">
                <i class="fas fa-bus text-4xl text-white"></i>
                <span class="text-4xl font-bold text-white">BusBook</span>
            </div>
            <p class="text-white/90 mt-4 text-lg">Your Journey, Our Priority</p>
        </div>
        <div class="glass-card overflow-hidden">
            <div class="p-8">
                <!-- Tabs -->
                <div class="flex gap-2 mb-8 bg-gray-100 rounded-xl p-1">
                    <button onclick="showLogin()" id="loginTab" class="flex-1 py-3 text-lg font-semibold rounded-lg transition-all duration-300 tab-active">
                        <i class="fas fa-sign-in-alt mr-2"></i> Login
                    </button>
                    <button onclick="showRegister()" id="registerTab" class="flex-1 py-3 text-lg font-semibold rounded-lg transition-all duration-300 text-gray-600 hover:text-gray-800">
                        <i class="fas fa-user-plus mr-2"></i> Register
                    </button>
                </div>
                <div id="loginForm">
                    <div class="mb-5">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-envelope mr-2 text-blue-500"></i> Email Address
                        </label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" 
                               class="input-field w-full px-4 py-3 rounded-xl focus:outline-none">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-lock mr-2 text-blue-500"></i> Password
                        </label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" 
                               class="input-field w-full px-4 py-3 rounded-xl focus:outline-none">
                    </div>
                    <div class="mb-4 flex justify-between items-center">
                        <label class="flex items-center">
                            <input type="checkbox" class="mr-2 rounded">
                            <span class="text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-700">Forgot password?</a>
                    </div>
                    <button onclick="login()" class="btn-login w-full text-white font-bold py-3 rounded-xl transition">
                        <i class="fas fa-sign-in-alt mr-2"></i> Login to Account
                    </button>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-user mr-2 text-green-500"></i> Full Name
                        </label>
                        <input type="text" id="regName" placeholder="Enter your full name" 
                               class="input-field w-full px-4 py-3 rounded-xl focus:outline-none">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-envelope mr-2 text-green-500"></i> Email Address
                        </label>
                        <input type="email" id="regEmail" placeholder="Enter your email" 
                               class="input-field w-full px-4 py-3 rounded-xl focus:outline-none">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-phone mr-2 text-green-500"></i> Phone Number (Optional)
                        </label>
                        <input type="tel" id="regPhone" placeholder="Enter your phone number" 
                               class="input-field w-full px-4 py-3 rounded-xl focus:outline-none">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-lock mr-2 text-green-500"></i> Password
                        </label>
                        <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)" 
                               class="input-field w-full px-4 py-3 rounded-xl focus:outline-none">
                    </div>
                    <button onclick="register()" class="btn-register w-full text-white font-bold py-3 rounded-xl transition">
                        <i class="fas fa-user-plus mr-2"></i> Create New Account
                    </button>
                </div>
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>
                
                <!-- Social Login -->
                <div class="grid grid-cols-2 gap-3">
                    <button class="border border-gray-300 rounded-xl py-2 px-4 hover:bg-gray-50 transition flex items-center justify-center gap-2">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-sm">Google</span>
                    </button>
                    <button class="border border-gray-300 rounded-xl py-2 px-4 hover:bg-gray-50 transition flex items-center justify-center gap-2">
                        <i class="fab fa-facebook text-blue-600"></i>
                        <span class="text-sm">Facebook</span>
                    </button>
                </div>
            </div>
        </div>
        <p class="text-center text-white/70 text-sm mt-8">
            By continuing, you agree to our <a href="#" class="text-white hover:underline">Terms of Service</a> & 
            <a href="#" class="text-white hover:underline">Privacy Policy</a>
        </p>
    </div>

    <script>
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('tab-active');
            document.getElementById('registerTab').classList.remove('tab-active');
            document.getElementById('registerTab').classList.add('text-gray-600');
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerTab').classList.add('tab-active');
            document.getElementById('loginTab').classList.remove('tab-active');
            document.getElementById('loginTab').classList.add('text-gray-600');
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                alert('Login failed. Please try again.');
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                alert('Please fill in all required fields');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (error) {
                alert('Registration failed. Please try again.');
            }
        }
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
