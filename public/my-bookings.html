<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bus Tracking - BusBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; border-radius: 16px; }
    </style>
</head>
<body class="bg-slate-100">
    <nav class="bg-blue-900 text-white p-5 flex justify-between items-center">
        <h1 class="text-3xl font-bold cursor-pointer" onclick="window.location.href='/'">BusBook</h1>
        <div class="flex gap-4 items-center">
            <span id="userName"></span>
            <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded-lg">Logout</button>
        </div>
    </nav>
    <div class="max-w-6xl mx-auto py-10 px-5">
        <h1 class="text-4xl font-bold mb-8">Live Bus Tracking</h1>
        <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
            <label class="block text-lg font-semibold mb-2">Select Bus</label>
            <select id="busSelect" class="w-full p-3 border rounded-xl mb-4">
                <option value="">Select a bus to track...</option>
            </select>
            <div id="busInfo" class="mt-4 p-4 bg-gray-100 rounded-xl hidden"></div>
        </div>
        <div id="map"></div>
    </div>
    <script>
        const socket = io();
        let map;
        let marker;
        let currentBusId = null;
        let allBuses = [];
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').textContent = `Hi, ${user.name}`;
        // Initialize map
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        async function loadBuses() {
            try {
                const response = await fetch('/api/buses');
                allBuses = await response.json();
                
                const select = document.getElementById('busSelect');
                select.innerHTML = '<option value="">Select a bus to track...</option>';
                
                allBuses.forEach(bus => {
                    select.innerHTML += `<option value="${bus._id}">${bus.name} (${bus.busNumber}) - ${bus.from} to ${bus.to}</option>`;
                });
            } catch (error) {
                console.error('Error loading buses:', error);
            }
        }
        document.getElementById('busSelect').addEventListener('change', async (e) => {
            const busId = e.target.value;
            if (!busId) return;
            currentBusId = busId;
            socket.emit('join-bus-tracking', busId); 
            try {
                const response = await fetch(`/api/location/${busId}`);
                const bus = await response.json();
                if (bus.currentLocation && bus.currentLocation.lat) {
                    updateMap(bus.currentLocation.lat, bus.currentLocation.lng);
                    document.getElementById('busInfo').innerHTML = `
                        <p><strong>Bus:</strong> ${bus.name}</p>
                        <p><strong>Last Updated:</strong> ${new Date(bus.currentLocation.lastUpdated).toLocaleString()}</p>
                    `;
                    document.getElementById('busInfo').classList.remove('hidden');
                } else {
                    document.getElementById('busInfo').innerHTML = `<p>Location data not available for this bus</p>`;
                    document.getElementById('busInfo').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading bus location:', error);
            }
        });
        socket.on('location-update', (data) => {
            if (data.busId === currentBusId) {
                updateMap(data.lat, data.lng);
                document.getElementById('busInfo').innerHTML = `
                    <p><strong>Bus:</strong> ${allBuses.find(b => b._id === data.busId)?.name || 'Bus'}</p>
                    <p><strong>Last Updated:</strong> ${new Date(data.timestamp).toLocaleString()}</p>
                    <p class="text-green-600">📍 Live location updated</p>
                `;
            }
        });
        function updateMap(lat, lng) {
            if (marker) {
                marker.setLatLng([lat, lng]);
            } else {
                marker = L.marker([lat, lng]).addTo(map);
                marker.bindPopup('<b>Bus Location</b>').openPopup();
            }
            map.setView([lat, lng], 13);
        }
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
        loadBuses();
    </script>
</body>
</html>
